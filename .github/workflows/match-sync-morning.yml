name: Match data morning sync

on:
  schedule:
    # 11:00 UTC ≈ 6:00 AM US Eastern (DST)
    - cron: "0 11 * * *"
  workflow_dispatch:

jobs:
  sync-matches:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Sync schedule and completed feeds from API-Football
        env:
          MATCH_API_KEY: ${{ secrets.MATCH_API_KEY }}
        run: npm run sync:matches

      - name: Commit updated static match data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/schedule.generated.ts src/data/feeds.index.generated.ts src/data/feeds/
          if git diff --staged --quiet; then
            echo "No match data changes to commit."
            exit 0
          fi
          git commit -m "$(cat <<'EOF'
chore: morning sync of World Cup match schedule and feeds

Automated daily pull from API-Football for committed static replay data.
EOF
)"
          git push
